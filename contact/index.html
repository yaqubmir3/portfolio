<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Yaqub Mir</title>
</head>

<body>
    <h1>Contact</h1>
    <form action="mailto:ymir@ucsd.edu" method="POST" enctype="text/plain">
    <label>
        Your Email:
        <input name="email" type="email" required>
    </label>
    <br>
    <label>
        Subject:
        <input name="subject">
    </label>
    <br>
    <label>
        Message:
        <textarea name="body" rows="5" cols="30"></textarea>
    </label>
    <br>
    <button>Send</button>
    </form>
    <script src="../global.js" type="module"></script>
</body>
</html>
